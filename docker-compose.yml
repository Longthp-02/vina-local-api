services:
  postgres:
    image: postgres:16-alpine
    container_name: vinal-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vinal_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vinal_local_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vinal_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vinal_local_postgres_data:
